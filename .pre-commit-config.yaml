repos:
- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v4.5.0
  hooks:
  - id: check-yaml
    args: [--allow-multiple-documents]
  - id: end-of-file-fixer
  - id: trailing-whitespace
- repo: local
  hooks:
  - id: flutter-format
    name: Flutter Format
    entry: dart format
    language: system
    types: [dart]

  - id: flutter-analyze
    name: Flutter Analyze
    entry: make analyze
    language: system
    types: [dart]
    pass_filenames: false

  - id: flutter-test
    name: Flutter Test
    entry: make test
    language: system
    types: [dart]
    pass_filenames: false

- repo: https://github.com/google/keep-sorted
  rev: v0.7.1
  hooks:
  - id: keep-sorted

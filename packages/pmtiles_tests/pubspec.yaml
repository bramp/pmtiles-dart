name: pmtiles_tests
description: Integration tests for pmtiles
version: 1.1.0
publish_to: none

environment:
  sdk: ^3.11.3
  flutter: ">=3.19.0"

resolution: workspace

# We don't actually need flutter, but this is a useful way to ensure
# we don't conflict with any pinned dependencies.
# https://github.com/dart-lang/sdk/wiki/Flutter-Pinned-Packages
dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  test: any
  http: ^1.4.0
  path: ^1.9.0
  pmtiles: ^2.0.0
  stream_channel: ^2.1.2
  json_serializable: ^6.9.0
  json_annotation: ^4.9.0
  build_runner: ^2.4.15
  convert: ^3.1.2
